<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== TOÀN BỘ CSS LIQUID GLASS ĐƯỢC GIỮ NGUYÊN VẸN 100% KHÔNG THIẾU MỘT CHỮ ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --accent: #00d4ff;
            --accent-deep: #0072ff;
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-soft: rgba(255, 255, 255, 0.5);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.08), transparent 45%),
                radial-gradient(circle at 80% 80%, rgba(0, 114, 255, 0.08), transparent 45%),
                #04070d;
            background-attachment: fixed; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 40px 20px;
        }
        .profile-card {
            width: 100%; max-width: 900px; background: var(--glass-bg); backdrop-filter: blur(45px) saturate(210%) brightness(1.1); -webkit-backdrop-filter: blur(45px) saturate(210%) brightness(1.1); border-radius: 3rem; padding: 60px; border: 1px solid var(--glass-border); border-top: 2px solid rgba(255,255,255,0.5); border-left: 1px solid rgba(255,255,255,0.2); box-shadow: 0 50px 100px rgba(0,0,0,0.7), inset 0 1px 4px rgba(255,255,255,0.2); display: grid; grid-template-columns: 240px 1fr; gap: 40px; align-items: center; position: relative; overflow: hidden;
        }
        .btn-back-in-card {
            position: absolute; top: 25px; left: 25px; width: 38px; height: 38px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 12px; display: flex; justify-content: center; align-items: center; color: #fff; text-decoration: none; border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.4); transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1); z-index: 10;
        }
        .btn-back-in-card:hover { background: rgba(0, 212, 255, 0.2); border-color: var(--accent); transform: scale(1.05) translateX(-2px); box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        .profile-left { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 20px; padding-top: 20px; }
        .avatar-liquid { width: 120px; height: 120px; background: linear-gradient(135deg, var(--accent), var(--accent-deep)); border-radius: 35px; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 800; border: 2px solid rgba(255,255,255,0.4); box-shadow: 0 0 40px rgba(0,212,255,0.3); }
        .role-badge { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); border-radius: 2rem; padding: 6px 16px; }
        .profile-right { border-left: 1px solid rgba(255,255,255,0.1); padding-left: 40px; }
        .profile-right h2 { font-size: 24px; font-weight: 800; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 1px; }
        .profile-right h2 span { color: var(--accent); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        .form-group label { font-size: 10px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700; }
        .form-control { width: 100%; padding: 14px 22px; background: rgba(255,255,255,0.03); border-radius: 2.5rem; border: 1px solid rgba(255,255,255,0.08); border-top: 1.5px solid rgba(255,255,255,0.4); color: #fff; font-size: 13px; outline: none; transition: all 0.3s ease; }
        .form-control:focus { background: rgba(255,255,255,0.08); border-top-color: var(--accent); box-shadow: 0 0 20px rgba(0,212,255,0.2); transform: translateY(-2px); }
        .btn-update { width: 100%; padding: 18px; border-radius: 2.5rem; background: linear-gradient(135deg, var(--accent), var(--accent-deep)); color: #fff; border: none; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.4s ease; border-top: 1px solid rgba(255,255,255,0.4); box-shadow: 0 10px 30px rgba(0,114,255,0.4); }
        .btn-update:hover { transform: translateY(-4px); filter: brightness(1.1); box-shadow: 0 15px 40px rgba(0,212,255,0.5); }
        .form-control[readonly] { opacity: 0.6; cursor: not-allowed; background: rgba(255, 255, 255, 0.01) !important; }
        .form-control[readonly]:focus, .form-control[readonly]:hover { transform: none !important; border-top-color: rgba(255, 255, 255, 0.4) !important; box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.1) !important; }
    </style>
</head>
<body>

    <div class="profile-card">
        <a th:href="@{/index}" class="btn-back-in-card" title="Quay lại">
            <i class="fa-solid fa-chevron-left"></i>
        </a>

        <div class="profile-left">
            <div class="avatar-liquid" 
                 th:text="${session.acc != null and session.acc.fullName != null} ? ${#strings.toUpperCase(#strings.substring(session.acc.fullName, 0, 1))} : 'U'">
                U
            </div>
            
            <div class="role-badge">
                <span th:if="${session.acc != null and session.acc.roleID == 1}">Quản trị viên</span>
                <th:block th:unless="${session.acc != null and session.acc.roleID == 1}">
                    <span th:text="${session.acc != null and session.acc.specialty != null and !#strings.isEmpty(session.acc.specialty)} ? ${session.acc.specialty} : 'Thành viên'">Thành viên</span>
                </th:block>
            </div>
            
            <div style="font-size: 12px; color: var(--text-soft);" 
                 th:text="${session.acc != null} ? ${session.acc.username} : 'username'">
                username
            </div>
        </div>

        <div class="profile-right">
            <h2>Hồ sơ <span>Của tôi</span></h2>

            <form th:action="@{/update-profile}" method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Tên đăng nhập</label>
                        <input type="text" class="form-control" 
                               th:value="${session.acc != null} ? ${session.acc.username} : ''" readonly />
                    </div>
                    
                    <div class="form-group">
                        <label>Họ và tên</label>
                        <input type="text" name="fullName" class="form-control" 
                               th:value="${session.acc != null} ? ${session.acc.fullName} : ''" />
                    </div>
                    
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" name="phone" class="form-control" 
                               th:value="${session.acc != null} ? ${session.acc.phone} : ''" />
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" 
                               th:value="${session.acc != null} ? ${session.acc.email} : ''" placeholder="Chưa có email" />
                    </div>
                </div>

                <button type="submit" class="btn-update">
                    <i class="fa-solid fa-floppy-disk" style="margin-right: 10px;"></i>
                    Lưu hồ sơ cá nhân
                </button>
            </form>
        </div>
    </div>

</body>
</html>
