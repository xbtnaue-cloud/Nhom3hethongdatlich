<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khôi phục mật khẩu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ===== TOÀN BỘ CSS LIQUID GLASS ĐỒNG BỘ 100% ===== */
        :root {
            --bg-dark: #050b18; --bg-accent: #0a162f; --accent: #00E5FF;
            --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.12); --text-light: #ffffff;
        }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: radial-gradient(circle at 20% 20%, rgba(0, 229, 255, 0.12), transparent 40%), radial-gradient(circle at 80% 80%, rgba(0, 229, 255, 0.1), transparent 40%), linear-gradient(135deg, #020617, #050b18); background-attachment: fixed; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: var(--text-light); }
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url(https://grainy-gradients.vercel.app/noise.svg); opacity: 0.03; pointer-events: none; z-index: 1; }
        .forgot-card { width: 100%; max-width: 450px; padding: 60px 45px; background: rgba(255, 255, 255, 0.01) !important; backdrop-filter: blur(45px) saturate(250%) brightness(1.2) !important; -webkit-backdrop-filter: blur(45px) saturate(250%) brightness(1.2); border-radius: 4rem; border: 1px solid rgba(255, 255, 255, 0.12) !important; border-top: 3px solid rgba(255, 255, 255, 0.6) !important; border-left: 2px solid rgba(255, 255, 255, 0.25) !important; box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7), inset 0 1px 5px rgba(255, 255, 255, 0.35); text-align: center; position: relative; z-index: 2; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .forgot-card:hover { transform: scale(1.01) translateY(-5px); background: rgba(255, 255, 255, 0.03) !important; border-top-color: rgba(255, 255, 255, 0.8) !important; }
        h2, p, label, input, .description, .back-link a { color: var(--text-light) !important; }
        h2 { font-weight: 600; margin-bottom: 15px; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
        .description { font-size: 13px; opacity: 0.8; margin-bottom: 30px; line-height: 1.6; }
        .form-group { text-align: left; margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; opacity: 1; padding-left: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input { width: 100%; padding: 15px 22px; background: rgba(255, 255, 255, 0.02) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1) !important; border-top: 1.5px solid rgba(255, 255, 255, 0.45) !important; border-radius: 2rem; color: #ffffff !important; outline: none; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.1); }
        .form-group input:focus { background: rgba(255, 255, 255, 0.1) !important; transform: scale(1.03) translateY(-1px); border-top-color: var(--accent) !important; box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3), 0 0 15px rgba(0, 229, 255, 0.2); }
        .btn-reset { width: 100%; padding: 16px; background: #ffffff; color: #000 !important; border: none; border-radius: 2.5rem; font-weight: 600; font-size: 15px; letter-spacing: 2px; cursor: pointer; transition: all 0.4s ease; text-transform: uppercase; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3); margin-top: 10px; font-family: 'Poppins', sans-serif; }
        .btn-reset:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 15px 35px rgba(255, 255, 255, 0.4); }
        .message { padding: 15px; border-radius: 1.5rem; margin-bottom: 20px; font-size: 13px; transition: opacity 1s ease; text-align: center; }
        .error-msg { background: rgba(248, 113, 113, 0.2); border: 1px solid #f87171; color: #ff5f5f !important; }
        .success-msg { background: rgba(74, 222, 128, 0.2); border: 1px solid #4ade80; color: #4ade80 !important; }
        .back-link { margin-top: 30px; font-size: 12px; }
        .back-link a { text-decoration: none; opacity: 0.7; transition: 0.3s; }
        .back-link a:hover { opacity: 1; text-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

    <div class="forgot-card">
        <h2 th:text="(${isEmailValid != null and isEmailValid} ? 'ĐẶT LẠI MẬT KHẨU' : 'QUÊN MẬT KHẨU')">QUÊN MẬT KHẨU</h2>
        
        <p class="description" th:text="(${isEmailValid != null and isEmailValid} ? 'Gmail hợp lệ! Hãy nhập mật khẩu mới để bảo mật tài khoản.' : 'Nhập Gmail để hệ thống kiểm tra thông tin khôi phục.')">
            Nhập Gmail để hệ thống kiểm tra thông tin khôi phục.
        </p>

        <div th:if="${error != null}" id="msg-alert" class="message error-msg" th:text="${error}"></div>
        <div th:if="${mess != null}" id="msg-alert" class="message success-msg" th:text="${mess}"></div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="form-group">
                <label>Gmail của bạn</label>
                <input type="email" 
                       name="email" 
                       th:value="${email != null ? email : ''}" 
                       placeholder="Nhập Gmail cũ..." 
                       th:readonly="${isEmailValid != null and isEmailValid}" 
                       th:style="(${isEmailValid != null and isEmailValid} ? 'opacity: 0.5; cursor: not-allowed;' : '')"
                       th:required="${isEmailValid == null or !isEmailValid}" />
            </div>

            <th:block th:if="${isEmailValid != null and isEmailValid}">
                <div class="form-group">
                    <label>Mật khẩu mới</label>
                    <input type="password" name="newPassword" placeholder="••••••••" required />
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu</label>
                    <input type="password" name="confirmPassword" placeholder="••••••••" required />
                </div>
                <input type="hidden" name="step" value="2" />
                <button type="submit" class="btn-reset">XÁC NHẬN THAY ĐỔI</button>
            </th:block>

            <th:block th:unless="${isEmailValid != null and isEmailValid}">
                <input type="hidden" name="step" value="1" />
                <button type="submit" class="btn-reset">KIỂM TRA GMAIL</button>
            </th:block>
        </form>

        <div class="back-link">
            <a th:href="@{/login}">← QUAY LẠI ĐĂNG NHẬP</a>
        </div>
    </div>

    <script th:inline="javascript">
        window.onload = function() {
            var msg = document.getElementById('msg-alert');
            if (msg) {
                setTimeout(function() {
                    msg.style.opacity = '0';
                    setTimeout(function() {
                        msg.style.display = 'none';
                    }, 1000); 
                }, 4000);
            }
        };
    </script>
</body>
</html>
