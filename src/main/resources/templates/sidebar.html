<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style th:fragment="sidebar-style">
        /* ===== TOÀN BỘ CSS SIDEBAR LIQUID GLASS ĐƯỢC GIỮ NGUYÊN VẸN VÀ LÀM SẠCH ===== */
        .sidebar {
            width: 230px; 
            height: 100vh; 
            padding: 20px 0; 
            position: fixed;
            top: 0; left: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.015); 
            backdrop-filter: blur(50px) saturate(250%) brightness(1.1);
            -webkit-backdrop-filter: blur(50px) saturate(250%) brightness(1.1);
            border-right: 1px solid rgba(255, 255, 255, 0.12);
            border-top: 2px solid rgba(255, 255, 255, 0.55);
            box-shadow: 15px 0 50px rgba(0, 0, 0, 0.6), inset 0 1px 3px rgba(255, 255, 255, 0.3);
        }

        .profile-box {
            margin: 0 14px 25px 14px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.35);
            display: flex; 
            align-items: center; 
            gap: 10px;
            flex-shrink: 0;
        }

        .admin-avatar {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #00d4ff 0%, #0072ff 100%);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 14px; color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .admin-info { text-align: left; }
        .admin-info strong { font-size: 13px; color: #fff; display: block; }
        .admin-info span { font-size: 10px; color: #00d4ff; display: block; }

        nav {
            flex: 1;
            overflow-y: auto; 
            padding: 0 14px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }

        nav::-webkit-scrollbar { width: 4px; }
        nav::-webkit-scrollbar-track { background: transparent; }
        nav::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        nav:hover::-webkit-scrollbar-thumb { background: rgba(0, 212, 255, 0.3); }

        .nav-item {
            display: flex !important; 
            align-items: center;
            padding: 10px 18px;
            border-radius: 2.5rem;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: visible;
        }

        .nav-item i {
            width: 20px;
            font-size: 15px;
            margin-right: 12px;
            text-align: center;
            display: inline-block !important;
            z-index: 2; 
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(6px);
            border-top-color: rgba(255, 255, 255, 0.4);
        }

        .nav-item.active {
            display: flex !important;
            align-items: center !important; 
            color: #fff !important;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(0, 114, 255, 0.15)) !important;
            backdrop-filter: blur(15px) saturate(200%);
            -webkit-backdrop-filter: blur(15px) saturate(200%);
            border-top: 2px solid rgba(255, 255, 255, 0.8) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.4) !important;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 212, 255, 0.3), inset 0 1px 4px rgba(255, 255, 255, 0.5) !important;
            transform: translateX(6px);
        }

        .nav-item.active i {
            display: inline-block !important; 
            width: 20px !important;           
            font-size: 15px !important;       
            margin-right: 12px !important;    
            color: #00d4ff !important;
            opacity: 1 !important;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
            font-family: "Font Awesome 6 Free" !important; 
            font-weight: 900 !important;                   
        }

        .nav-item.active::before {
            content: "";
            position: absolute;
            left: 6px; top: 25%; height: 50%; width: 3px;
            border-radius: 10px;
            background: #00d4ff;
            box-shadow: 0 0 10px #00d4ff;
        }

        .logout-box { padding: 0 14px 20px 14px; margin-top: auto; flex-shrink: 0; }
        .nav-item.logout { color: #ff6b6b; background: rgba(255, 107, 107, 0.05); border-top: 1px solid rgba(255, 107, 107, 0.3); margin-bottom: 0; }
        .nav-item.logout:hover { background: rgba(255, 107, 107, 0.15); color: #ff8e8e; box-shadow: 0 10px 20px rgba(255, 107, 107, 0.2); }
    </style>
</head>
<body>

    <div th:fragment="sidebar" class="sidebar">
        <div class="profile-box">
            <div class="admin-avatar" 
                 th:text="${session.acc != null and session.acc.fullName != null} ? ${#strings.toUpperCase(#strings.substring(session.acc.fullName, 0, 1))} : 'A'">
                A
            </div>
            <div class="admin-info">
                <strong th:text="${session.acc != null and session.acc.fullName != null} ? ${session.acc.fullName} : 'Admin'">Admin</strong>
                <span th:text="${session.acc != null} ? '@' + ${session.acc.username} : '@admin'">@admin</span>
                
                <div style="margin-top: 4px; font-size: 8px; padding: 2px 8px; background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 6px; color: #00d4ff; width: fit-content; text-transform: uppercase; font-weight: 700;">
                    <span th:if="${session.acc != null and session.acc.roleID == 1}">Quản trị viên</span>
                    <th:block th:unless="${session.acc != null and session.acc.roleID == 1}">
                        <span th:text="${session.acc != null and session.acc.specialty != null and !#strings.isEmpty(session.acc.specialty)} ? ${session.acc.specialty} : 'Bác sĩ chuyên khoa'">Bác sĩ chuyên khoa</span>
                    </th:block>
                </div>
            </div>
        </div>

        <nav>
            <a th:href="@{/admin-dashboard}" class="nav-item" 
               th:classappend="${#strings.isEmpty(activePage) or activePage == 'appointments'} ? 'active' : ''">
                <i class="fa-solid fa-calendar-check"></i> Lịch hẹn
            </a>

            <a th:href="@{/patients}" class="nav-item" 
               th:classappend="${activePage == 'patients'} ? 'active' : ''">
                <i class="fa-solid fa-user-group"></i> Bệnh nhân
            </a>

            <a th:href="@{/admin-contacts}" class="nav-item" 
               th:classappend="${activePage == 'contacts'} ? 'active' : ''">
                <i class="fa-solid fa-comment-dots"></i> Lời nhắn
            </a>

            <a th:href="@{/admin-stats}" class="nav-item" 
               th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                <i class="fa-solid fa-chart-line"></i> Thống kê
            </a>

            <th:block th:if="${session.acc != null and session.acc.roleID == 1}">
                <a th:href="@{/manage-doctors}" class="nav-item" 
                   th:classappend="${activePage == 'doctors'} ? 'active' : ''">
                    <i class="fa-solid fa-user-doctor"></i> Bác sĩ
                </a>

                <a th:href="@{/manage-services}" class="nav-item" 
                   th:classappend="${activePage == 'services'} ? 'active' : ''">
                    <i class="fa-solid fa-briefcase-medical"></i> Dịch vụ
                </a>

                <a th:href="@{/manage-users}" class="nav-item" 
                   th:classappend="${activePage == 'users'} ? 'active' : ''">
                    <i class="fa-solid fa-user-shield"></i> Phân quyền
                </a>
            </th:block>
        </nav>

        <div class="logout-box">
            <a th:href="@{/logout}" class="nav-item logout">
                <i class="fa-solid fa-power-off"></i> Đăng xuất
            </a>
        </div>
    </div>

</body>
</html>
