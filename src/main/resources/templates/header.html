<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style th:fragment="header-style">
        :root {
            --accent: #00d4ff;
            --accent-deep: #0072ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow: rgba(0, 212, 255, 0.5);
        }

        .header-glass {
            display: flex; justify-content: space-between; align-items: center;
            left: 0; right: 0; width: auto; margin: 0 5px; padding: 12px 60px;
            border-bottom-left-radius: 45px; border-bottom-right-radius: 45px;
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(40px) saturate(220%) brightness(1.1);
            -webkit-backdrop-filter: blur(40px) saturate(220%) brightness(1.1);
            position: sticky; top: 0; z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1); border-top: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.45);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .logo { font-size: 24px; font-weight: 700; letter-spacing: 3px; color: #fff; text-decoration: none; text-shadow: 0 0 15px var(--glow); flex-shrink: 0; }
        .nav-container { display: flex; align-items: center; flex: 1; justify-content: flex-end; }
        .nav-links { display: flex; gap: 8px; align-items: center; }
        
        .nav-btn { 
            color: rgba(255, 255, 255, 0.6); text-decoration: none; font-size: 13px; 
            font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; 
            padding: 10px 22px; border-radius: 2.5rem; transition: all 0.4s ease; 
            border: 1px solid transparent; white-space: nowrap; flex-shrink: 0; 
        }
        
        /* Hiệu ứng nẹp kính nổi khối khi di chuột hoặc được Active */
        .nav-btn:hover, .nav-btn.active { 
            color: #fff !important; 
            background: rgba(255, 255, 255, 0.05) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            border-top: 2px solid rgba(255, 255, 255, 0.6) !important; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4) !important; 
            transform: translateY(-2px) !important; 
        }
        
        .search-wrapper { position: relative; margin-left: 10px; }
        .search-trigger-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.4); color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .dropdown-search-liquid { display: none; position: absolute; top: 65px; right: 0; min-width: 280px; padding: 20px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(40px) saturate(180%); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.1); border-top: 2px solid rgba(255, 255, 255, 0.5); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8); z-index: 1001; animation: slideDown 0.3s ease-out; }
        .search-inner-form { display: flex; align-items: center; gap: 10px; }
        .search-inner-form input { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 15px; border-radius: 1.2rem; color: #fff; outline: none; font-size: 13px; }
        .search-inner-form button { background: var(--accent); border: none; width: 35px; height: 35px; border-radius: 50%; color: #fff; cursor: pointer; }
        .user-section { display: flex; align-items: center; margin-left: 20px; padding-left: 20px; border-left: 1px solid rgba(255, 255, 255, 0.1); position: relative; }
        .avatar-circle { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px var(--glow); cursor: pointer; }
        .dropdown-liquid { display: none; position: absolute; top: 65px; right: 0; min-width: 220px; padding: 25px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(40px) saturate(180%); border-radius: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.1); border-top: 2px solid rgba(255, 255, 255, 0.5); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8); z-index: 1001; animation: slideDown 0.3s ease-out; }
        .dropdown-user-info { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; text-align: left; }
        .dropdown-user-info strong { color: #fff; font-size: 16px; text-transform: capitalize; }
        .dropdown-user-info span { font-size: 10px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .drop-item { color: #fff; text-decoration: none; font-size: 13px; padding: 10px 0; display: block; transition: 0.3s; text-align: left; }
        .drop-item:hover { color: var(--accent); transform: translateX(5px); }
        .logout-text { display: block; color: #ff4d4d !important; text-decoration: none; font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-top: 15px; padding: 10px 15px; border-radius: 1.2rem; text-align: center; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); border: 1px solid transparent; }
        .logout-text:hover { background: rgba(255, 77, 77, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 77, 77, 0.2); border-top: 2px solid rgba(255, 100, 100, 0.7); border-left: 1px solid rgba(255, 100, 100, 0.3); box-shadow: 0 10px 20px rgba(255, 0, 0, 0.2); transform: translateY(-2px); color: #ff7070 !important; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header th:fragment="header" class="header-glass">
        
        <a th:href="@{/index}" class="logo">NHA KHOA NAU</a>

        <div class="nav-container">
            <nav class="nav-links">
                <a th:href="@{/index}" class="nav-btn" th:classappend="${activePage == 'home'} ? ' active' : ''">Trang chủ</a>
                <a th:href="@{/service-list}" class="nav-btn" th:classappend="${activePage == 'services'} ? ' active' : ''">Dịch vụ</a>
                <a th:href="@{/dentist-list}" class="nav-btn" th:classappend="${activePage == 'doctors'} ? ' active' : ''">Bác sĩ</a>
                <a th:href="@{/contact}" class="nav-btn" th:classappend="${activePage == 'contact'} ? ' active' : ''">Liên hệ</a>
                
                <div class="search-wrapper">
                    <button class="search-trigger-btn" onclick="toggleSearchMenu(event)">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <div id="searchDropdown" class="dropdown-search-liquid" onclick="event.stopPropagation()">
                        <div style="font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; text-align: left;">Tra cứu lịch hẹn</div>
                        <form th:action="@{/lookup-appointment}" method="GET" class="search-inner-form">
                            <input type="text" name="phone" placeholder="Số điện thoại..." required autocomplete="off" />
                            <button type="submit"><i class="fa-solid fa-chevron-right"></i></button>
                        </form>
                    </div>
                </div>
            </nav>

            <div class="user-section">
                <a th:if="${session.acc == null}" th:href="@{/login}" class="nav-btn" style="border: 1px solid rgba(255,255,255,0.3); color: #fff;">Đăng nhập</a>

                <th:block th:if="${session.acc != null}">
                    <div class="avatar-circle" onclick="toggleUserMenu(event)" 
                         th:text="${session.acc.fullName != null ? #strings.toUpperCase(#strings.substring(session.acc.fullName, 0, 1)) : 'U'}">
                        U
                    </div>
                    
                    <div id="userDropdown" class="dropdown-liquid" onclick="event.stopPropagation()">
                        <div class="dropdown-user-info">
                            <strong th:text="${session.acc.fullName}">Tên người dùng</strong>
                            <span th:text="${session.acc.roleID == 1 ? 'Quản trị viên' : 'Thành viên'}">Vai trò</span>
                        </div>
                        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;" />
                        <div class="dropdown-links">
                            <a th:href="@{/profile}" class="drop-item">Hồ sơ cá nhân</a>
                            <a th:href="@{/my-appointments}" class="drop-item">Lịch hẹn của tôi</a>
                            <a th:href="@{/logout}" class="logout-text">ĐĂNG XUẤT</a>
                        </div>
                    </div>
                </th:block>
            </div>
        </div>
    </header>

    <script th:inline="javascript">
        function toggleSearchMenu(event) {
            event.stopPropagation();
            const searchMenu = document.getElementById('searchDropdown');
            const userMenu = document.getElementById('userDropdown');
            if (userMenu) userMenu.style.display = 'none';
            searchMenu.style.display = (searchMenu.style.display === 'block') ? 'none' : 'block';
        }

        function toggleUserMenu(event) {
            event.stopPropagation();
            const userMenu = document.getElementById('userDropdown');
            const searchMenu = document.getElementById('searchDropdown');
            if (searchMenu) searchMenu.style.display = 'none';
            userMenu.style.display = (userMenu.style.display === 'block') ? 'none' : 'block';
        }

        window.addEventListener('click', function() {
            const searchMenu = document.getElementById('searchDropdown');
            const userMenu = document.getElementById('userDropdown');
            if (searchMenu) searchMenu.style.display = 'none';
            if (userMenu) userMenu.style.display = 'none';
        });
    </script>
</body>
</html>
